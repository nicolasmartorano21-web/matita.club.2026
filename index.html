
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matita - Librería & Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Gochi+Hand&family=Caveat:wght@400..700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --matita-beige: #fef9eb;
            --matita-orange: #f6a118;
            --matita-yellow: #fadb31;
            --matita-pink: #ea7e9c;
            --matita-cream: #fffaf0;
            --sticker-shadow: 0 8px 24px -4px rgba(246,161,24,0.18), 0 0 0 5px white;
            --radius-card: 1.5rem;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            background-color: var(--matita-beige);
            background-image: radial-gradient(rgba(0,0,0,0.055) 1.5px, transparent 1.5px);
            background-size: 26px 26px;
            color: #3d3d3d;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Patrick Hand', cursive;
            line-height: 1.15;
            letter-spacing: -0.02em;
        }
        .font-matita { font-family: 'Patrick Hand', cursive; }
        .font-logo   { font-family: 'Gochi Hand', cursive; }

        /* Gradientes */
        .matita-gradient-orange { background: linear-gradient(135deg, #f6a118 0%, #fadb31 100%); }
        .matita-gradient-pink   { background: linear-gradient(135deg, #ea7e9c 0%, #fadb31 100%); }

        /* Sombras */
        .shadow-matita { box-shadow: 0 10px 30px -6px rgba(246,161,24,0.22), 0 4px 10px -4px rgba(246,161,24,0.12); }
        .shadow-card   { box-shadow: var(--sticker-shadow); }

        /* Inputs y selects — estilo papelería limpia */
        input, select, textarea {
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #3d3d3d;
            background: #ffffff;
            border: 2px solid #e8e0cc;
            border-radius: 999px;
            padding: 0.65rem 1.25rem;
            transition: var(--transition-smooth);
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--matita-yellow);
            box-shadow: 0 0 0 3px rgba(250,219,49,0.18);
        }
        textarea { border-radius: 1.2rem; }

        /* Botones base */
        button { transition: var(--transition-smooth); }

        /* Scrollbar oculto */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { transform: translateX(100%); }
            to   { transform: translateX(0); }
        }
        @keyframes wiggle {
            0%   { transform: rotate(0deg)   scale(1); }
            15%  { transform: rotate(-18deg) scale(1.15); }
            30%  { transform: rotate(18deg)  scale(1.15); }
            45%  { transform: rotate(-10deg) scale(1.08); }
            60%  { transform: rotate(10deg)  scale(1.08); }
            80%  { transform: rotate(-4deg)  scale(1.03); }
            100% { transform: rotate(0deg)   scale(1); }
        }
        .animate-fadeIn  { animation: fadeIn  0.45s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.35s ease-out forwards; }
        .animate-wiggle  { animation: wiggle  0.6s ease-in-out; }

        body { overflow-x: hidden; }
    </style>
<script type="importmap">
{
